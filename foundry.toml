[profile.default]
src = "src"
out = "out"
test = "test"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Fork tests read MAINNET_RPC_URL from the env (see test/fork/). This entry also lets you
# pass `--fork-url mainnet` explicitly.
[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
base = "${BASE_RPC_URL}"

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
